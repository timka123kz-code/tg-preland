<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>UBET.KZ - Забрать 5000₸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at center, #1e1e1e 0%, #0f0f0f 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            color: #ffffff;
        }
        .container { 
            background: #1a1a1a; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(163, 255, 0, 0.08); 
            max-width: 480px; 
            width: 100%; 
            padding: 50px 35px; 
            text-align: center;
            border: 1px solid rgba(163, 255, 0, 0.1);
        }
        
        .bonus-section {
            margin-bottom: 35px;
        }
        
        .bonus-amount {
            font-size: 84px;
            font-weight: 900;
            color: #a3ff00;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 25px rgba(163, 255, 0, 0.3);
            letter-spacing: -3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .symbol {
            font-size: 64px;
            margin-left: 5px;
            font-weight: 700;
        }
        
        .status-badge {
            display: inline-block;
            background: rgba(163, 255, 0, 0.1);
            border: 1px solid #a3ff00;
            color: #a3ff00;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
        }
        
        h1 { 
            font-size: 24px; 
            font-weight: 800; 
            color: #ffffff; 
            margin-bottom: 8px; 
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }
        
        .subtitle { 
            font-size: 15px; 
            color: #b0b0b0; 
            margin-bottom: 40px; 
            line-height: 1.6;
        }
        
        .button { 
            background: #a3ff00; 
            color: #000000; 
            border: none; 
            padding: 20px 40px; 
            font-size: 18px; 
            font-weight: 800; 
            border-radius: 14px; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 25px; 
            text-decoration: none; 
            display: inline-block;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(163, 255, 0, 0.2);
        }
        
        .button:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 15px 35px rgba(163, 255, 0, 0.4);
            background: #b4ff33;
        }
        
        .note { 
            font-size: 12px; 
            color: #666; 
            margin-bottom: 30px; 
            line-height: 1.5;
        }
        
        .footer-section {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 25px;
        }
        
        .footer-logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #ffffff;
        }
        
        .brand-accent {
            color: #a3ff00;
        }
        
        .divider {
            height: 1px;
            background: rgba(163, 255, 0, 0.1);
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bonus-section">
            <div class="bonus-amount">5000<span class="symbol">₸</span></div>
            <div class="status-badge">✓ Официальный букмекер КЗ</div>
        </div>
        
        <h1>ЗАБРАТЬ БОНУС</h1>
        <p class="subtitle">Получи фрибет и начни выигрывать с UBET.KZ</p>
        
        <a href="https://click.ubtracks.com/6zn8gNjd?landing=292" class="button">ЗАБРАТЬ ФРИБЕТ</a>
        
        <p class="note">Нажимая кнопку, вы переходите на официальный сайт UBET.KZ</p>
        
        <div class="divider"></div>
        
        <div class="footer-section">
            <div class="footer-logo">UBET<span class="brand-accent">.KZ</span></div>
        </div>
    </div>
</body>
</html>
